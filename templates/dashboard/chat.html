<!DOCTYPE html>
<html>
<head>
    <title>ChatBerry</title>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>

<div class="app">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">

        <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>

        <div class="history" id="history"></div>

        <!-- Bottom buttons -->
        <div class="sidebar-footer">
            <button class="danger-btn" onclick="deleteLast()">🗑 Delete Last</button>
            <button class="danger-btn" onclick="deleteAll()">⚠ Delete All</button>
        </div>

    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">

        <!-- ===== TOP BAR ===== -->
        <div class="top-bar">

            <div class="mode-group">
                <button id="normal-btn" class="mode-btn active" onclick="setMode('normal')">🔎 Normal</button>
                <button id="deep-btn" class="mode-btn" onclick="setMode('deep')">🧠 Deep</button>
            </div>

            <div class="user-menu" onclick="toggleDropdown()">

            <div class="avatar">👤</div>
            <span id="user-info">Login</span>

            <!-- DROPDOWN -->
            <div id="dropdown" class="dropdown hidden">
                <div onclick="logoutAndSwitch()">🔄 Switch Account</div>
                <div onclick="logoutAndSwitch()">🚪 Logout</div>
            </div>

</div>

        </div>

        <!-- ===== CHAT ===== -->
        <div id="chat-box" class="chat-box"></div>

        <!-- ===== INPUT ===== -->
        <div class="input-area">

            <input type="file" id="fileInput" hidden />

            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📁</button>

            <input type="text" id="message" placeholder="Type your message..." />

            <button id="speaker-btn" class="icon-btn" onclick="toggleSpeaker()">🔇</button>

            <button class="send-btn" onclick="sendMessage()">➤</button>

        </div>

    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/chat.js"></script>

</body>
</html>
