<!DOCTYPE html>
<html>
<head>
    <title>ChatBerry</title>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <button onclick="newChat()">+ New Chat</button>

        <div class="history" id="history"></div>

        <div class="sidebar-actions">
            <button onclick="deleteLast()">Delete Last</button>
            <button onclick="deleteAll()">Delete All</button>
        </div>
    </div>

<div class="main">

    <!-- ==========================
         🔝 TOP BAR
    ========================== -->
    <div class="top-bar">

        <button id="normal-btn" class="mode-btn active" onclick="setMode('normal')">
            🔎 Normal
        </button>

        <button id="deep-btn" class="mode-btn" onclick="setMode('deep')">
            🧠 Deep
        </button>

        <!-- 👤 USER BUTTON -->
        <button id="user-info" onclick="handleUserClick()" 
                style="margin-left:auto; padding:6px 12px; cursor:pointer;">
            Login
        </button>
        <div id="google-btn" style="display:none;"></div>

    </div>

    <!-- 💬 CHAT BOX -->
    <div id="chat-box" class="chat-box"></div>

    <!-- ✍️ INPUT AREA -->
    <div class="input-area">

        <input type="file" id="fileInput" hidden />
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📁</button>

        <input type="text" id="message" placeholder="Type your message..." />

        <button id="speaker-btn" onclick="toggleSpeaker()">🔇</button>

        <button class="send-btn" onclick="sendMessage()">➤</button>

    </div>

</div>

</div>

<!-- Scripts -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/chat.js"></script>

</body>
</html>
