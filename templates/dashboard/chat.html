<!DOCTYPE html>
<html>
<head>
    <title>ChatBerry</title>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>

<div class="app">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">

        <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>

        <div class="history" id="history"></div>

        <div class="sidebar-footer">
            <button class="danger-btn" onclick="deleteLast()">🗑 Delete Last</button>
            <button class="danger-btn" onclick="deleteAll()">⚠ Delete All</button>
        </div>

    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">

        <!-- ===== TOP BAR ===== -->
        <div class="top-bar">

            <div class="mode-group">
                <button id="normal-btn" class="mode-btn active" onclick="setMode('normal')">🔎 Normal</button>
                <button id="deep-btn" class="mode-btn" onclick="setMode('deep')">🧠 Deep</button>
                <button class="mode-btn" onclick="toggleSideChat()">🪟 Side Chat</button>
            </div>

            <!-- ===== USER MENU ===== -->
            <div class="user-menu">

                <div class="avatar" onclick="toggleDropdown(event)">👤</div>
                <span id="user-info" onclick="handleLoginClick()">Login</span>

                <!-- DROPDOWN -->
                <div id="dropdown" class="dropdown hidden" onclick="event.stopPropagation()">
                    <div onclick="switchAccount()">🔄 Switch Account</div>
                    <div onclick="logout()">🚪 Logout</div>
                </div>

            </div>

        </div>

        <!-- ===== MAIN CHAT ===== -->
        <div id="main-chat" class="chat-box"></div>

        <!-- ===== SIDE CHAT ===== -->
        <div id="chat-container" class="chat-container hidden">

            <!-- Window 1 -->
            <div class="chat-panel" id="panel-1">
                <div class="panel-header">
                    Window 1 <span onclick="closePanel(1)">❌</span>
                </div>
                <div class="chat-box" id="chat-box-1"></div>
            </div>

            <!-- Window 2 -->
            <div class="chat-panel" id="panel-2">
                <div class="panel-header">
                    Window 2 <span onclick="closePanel(2)">❌</span>
                </div>
                <div class="chat-box" id="chat-box-2"></div>
            </div>

        </div>

        <!-- ===== INPUT ===== -->
        <div class="input-area">

            <input type="file" id="fileInput" hidden />

            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📁</button>

            <input type="text" id="message" placeholder="Type your message..." />

            <button id="speaker-btn" class="icon-btn" onclick="toggleSpeaker()">🔇</button>

            <button class="send-btn" onclick="sendMessage()">➤</button>

        </div>

    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/chat.js"></script>

</body>
</html>
