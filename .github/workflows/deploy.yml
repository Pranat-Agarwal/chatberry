name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Basic test
        run: echo "Tests passed"

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST ${{'https://api.render.com/deploy/srv-d74rpghr0fns73d3coa0?key=UeIykqofwhE'}}